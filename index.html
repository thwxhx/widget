<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Matches Widget - Brand Logos Included</title>
<style>
    :root {
        --bg-main: #09090b;
        --bg-card: #222222;
        --bg-button: #1a1a1a;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --border-color: #3f3f46;
        --accent-blue: #007bff;
        --accent-green: #25d366;
        --live-green: #00c853;
        --card-border-left: #796fc7; /* Your custom border color */
        --text-red: #ff4d4d; /* Your custom text color */
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }

    .widget-container {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* Top Sport Filters */
    .sport-filters {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 8px;
    }

    .sport-btn {
        background-color: var(--bg-button);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: border-color 0.2s ease;
    }

    .sport-btn.active {
        border-color: var(--text-main);
    }

    /* Day Filters */
    .day-filters {
        display: flex;
        background-color: var(--bg-button);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .day-btn {
        flex: 1;
        background: transparent;
        color: var(--text-muted);
        border: none;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.2s ease, border 0.2s ease;
        border: 1px solid transparent;
    }

    .day-btn.active {
        color: var(--text-main);
        border: 1px solid var(--text-main);
        border-radius: 12px;
    }

    /* Match Cards */
    .match-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .match-card {
        background-color: var(--bg-card);
        border-radius: 12px;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        border-left: 4px solid var(--card-border-left);
        transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .match-card:hover {
        background-color: #2a2a2a;
        transform: translateY(-2px);
    }

    .match-main {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }

    .team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 30%;
    }

    .team img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
    }

    .team-name {
        font-size: 14px;
        font-weight: 600;
        text-align: center;
        color: var(--text-red);
    }

    .score-time {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 40%;
    }

    .score-text {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-red);
    }

    .status-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 12px;
        background-color: #444;
        color: #fff;
        min-width: 40px;
        text-align: center;
    }

    .status-badge.live {
        background-color: var(--live-green);
    }

    /* Aligned Footer */
    .match-footer {
        display: flex;
        align-items: center;
        font-size: 11px;
        color: var(--text-muted);
    }

    .footer-left {
        width: 30%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
    }

    .footer-center {
        width: 40%;
        text-align: center;
    }

    .footer-right {
        width: 30%;
        text-align: center;
    }

    /* Social Action Row */
    .social-buttons {
        display: flex;
        gap: 12px;
        margin-top: 16px;
    }

    .social-btn {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px; /* Enhanced alignment spacing */
        text-decoration: none;
    }

    .social-btn svg {
        display: block;
        fill: currentColor; /* Inherits white color automatically */
    }

    .telegram-btn {
        background-color: var(--accent-blue);
    }

    .whatsapp-btn {
        background-color: var(--accent-green);
    }
</style>
</head>
<body>

<div class="widget-container">

            <div class="match-footer">

    <div class="social-buttons">

</div>

<script>
    // --- 1. VISUAL BUTTON CLICKS ---
    const sportBtns = document.querySelectorAll('.sport-btn');
    sportBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            sportBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    const dayBtns = document.querySelectorAll('.day-btn');
    dayBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            dayBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // --- 2. MATCH TIMERS LOGIC ---
    function updateMatchTimers() {
        const badges = document.querySelectorAll('.timer-badge');
        const now = new Date().getTime();
        const matchDuration = 2 * 60 * 60 * 1000; 

        badges.forEach(badge => {
            const kickoffTimeStr = badge.getAttribute('data-kickoff');
            if (!kickoffTimeStr) return;

            const kickoffTime = new Date(kickoffTimeStr).getTime();
            const timeDifference = kickoffTime - now;
            const timeText = badge.parentElement.querySelector('.score-text');

            if (timeDifference > 0) {
                badge.classList.add('live'); 
                if (timeText) timeText.style.display = 'block';
                
                const hours = Math.floor(timeDifference / (1000 * 60 * 60));
                const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

                let displayText = "";
                if (hours > 0) displayText += (hours < 10 ? "0" + hours : hours) + ":";
                displayText += (minutes < 10 ? "0" + minutes : minutes) + ":";
                displayText += (seconds < 10 ? "0" + seconds : seconds);

                badge.textContent = displayText;

            } else if (timeDifference <= 0 && Math.abs(timeDifference) < matchDuration) {
                badge.textContent = "LIVE";
                badge.classList.add('live');
                if (timeText) timeText.style.display = 'none';
                
            } else {
                badge.textContent = "FT";
                badge.classList.remove('live');
                badge.classList.remove('timer-badge');
                if (timeText) timeText.style.display = 'none'; 
            }
        });
    }

    updateMatchTimers();
    setInterval(updateMatchTimers, 1000);
</script>

</body>
</html>
